<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>My School's Webpage</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    </head>
    <body>
        <form>
            <fieldset>
                <!--The field set tag is used to group related elements in a form and draw boxes around them-->
                <legend>Personal Information: </legend>
                <label>Full Name:</label>
                <!--placeholder attribute can be used to provide extra information about enty to be made-->
                <input type="text" id="fname" placeholder="Enter Name"><br><br>
                <label>Email:</label>
                <input type="text" id="email"><br><br>
                <label>Gender:</label>
                <input type="radio" id="gender" value="female">Female<br><br>
                <input type="radio" id="gender" value="male">Male<br><br>
                <label>Birthday:</label>
                <input type="date" id="birthday" name="birthday"><br><br>
                <label>Hobby:</label>
                <input type="text" id="hobby" name="hobby"><br><br>
                <label>Age:</label>
                <input type="text" id="age" name="age"><br><br>
                <input type="submit">
            </fieldset> 
        </form>
    </body>
</html>
